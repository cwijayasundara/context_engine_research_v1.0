services:
  neo4j:
    image: neo4j:5.23-enterprise
    container_name: finance-ctx-neo4j
    environment:
      NEO4J_AUTH: neo4j/please-change-me
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*
      NEO4J_dbms_memory_heap_max__size: 2G
    ports:
      - "7475:7474"   # Browser UI (host 7475 — host 7474 is taken by lennygraph-neo4j)
      - "7688:7687"   # Bolt      (host 7688 — host 7687 is taken by lennygraph-neo4j)
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j-data:
  neo4j-logs:
